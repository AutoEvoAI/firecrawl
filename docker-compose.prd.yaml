name: firecrawl-production

x-common-service: &common-service
  build: apps/api
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  networks:
    - backend
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"
  restart: unless-stopped

x-common-env: &common-env
  REDIS_URL: ${REDIS_URL:-redis://redis-cluster:6379}
  REDIS_RATE_LIMIT_URL: ${REDIS_RATE_LIMIT_URL:-redis://redis-cluster:6379}
  PLAYWRIGHT_MICROSERVICE_URL: ${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright-service:3000/scrape}
  POSTGRES_USER: ${POSTGRES_USER:-firecrawl}
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
  POSTGRES_DB: ${POSTGRES_DB:-firecrawl}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres-cluster}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  USE_DB_AUTHENTICATION: ${USE_DB_AUTHENTICATION:-false}
  NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-16}
  CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-20}
  MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-10}
  BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-10}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL}
  MODEL_NAME: ${MODEL_NAME}
  MODEL_EMBEDDING_NAME: ${MODEL_EMBEDDING_NAME}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
  AUTUMN_SECRET_KEY: ${AUTUMN_SECRET_KEY}
  AUTUMN_EXPERIMENT: ${AUTUMN_EXPERIMENT}
  AUTUMN_EXPERIMENT_PERCENT: ${AUTUMN_EXPERIMENT_PERCENT}
  AUTUMN_REQUEST_TRACK_EXPERIMENT: ${AUTUMN_REQUEST_TRACK_EXPERIMENT}
  AUTUMN_REQUEST_TRACK_EXPERIMENT_PERCENT: ${AUTUMN_REQUEST_TRACK_EXPERIMENT_PERCENT}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
  BULL_AUTH_KEY: ${BULL_AUTH_KEY}
  TEST_API_KEY: ${TEST_API_KEY}
  SUPABASE_ANON_TOKEN: ${SUPABASE_ANON_TOKEN}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_TOKEN: ${SUPABASE_SERVICE_TOKEN}
  SUPABASE_REPLICA_URL: ${SUPABASE_REPLICA_URL}
  INDEX_SUPABASE_URL: ${INDEX_SUPABASE_URL}
  INDEX_SUPABASE_SERVICE_TOKEN: ${INDEX_SUPABASE_SERVICE_TOKEN}
  SELF_HOSTED_WEBHOOK_URL: ${SELF_HOSTED_WEBHOOK_URL}
  LOGGING_LEVEL: ${LOGGING_LEVEL:-WARN}
  PROXY_SERVER: ${PROXY_SERVER}
  PROXY_USERNAME: ${PROXY_USERNAME}
  PROXY_PASSWORD: ${PROXY_PASSWORD}
  PROXY_STEALTH_SERVER: ${PROXY_STEALTH_SERVER}
  PROXY_STEALTH_USERNAME: ${PROXY_STEALTH_USERNAME}
  PROXY_STEALTH_PASSWORD: ${PROXY_STEALTH_PASSWORD}
  OPENSANDBOX_URL: ${OPENSANDBOX_URL}
  OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY}
  BROWSER_SERVICE_TYPE: ${BROWSER_SERVICE_TYPE}
  SEARXNG_ENDPOINT: ${SEARXNG_ENDPOINT}
  SEARXNG_ENGINES: ${SEARXNG_ENGINES}
  SEARXNG_CATEGORIES: ${SEARXNG_CATEGORIES}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  AI_SEARCH_LLM_MODEL: ${AI_SEARCH_LLM_MODEL}
  AI_SEARCH_LLM_API_KEY: ${AI_SEARCH_LLM_API_KEY}
  AI_SEARCH_LLM_BASE_URL: ${AI_SEARCH_LLM_BASE_URL}
  AI_SEARCH_RERANK_MODEL: ${AI_SEARCH_RERANK_MODEL}
  AI_SEARCH_RERANK_PROVIDER: ${AI_SEARCH_RERANK_PROVIDER}
  AI_SEARCH_RERANK_ENDPOINT: ${AI_SEARCH_RERANK_ENDPOINT}
  AI_SEARCH_RERANK_API_KEY: ${AI_SEARCH_RERANK_API_KEY}
  AI_SEARCH_RERANK_TIMEOUT: ${AI_SEARCH_RERANK_TIMEOUT}
  AI_SEARCH_CACHE_ENABLED: ${AI_SEARCH_CACHE_ENABLED:-true}
  AI_SEARCH_CACHE_TTL_NON_AI: ${AI_SEARCH_CACHE_TTL_NON_AI:-3600}
  AI_SEARCH_CACHE_TTL_AI: ${AI_SEARCH_CACHE_TTL_AI:-300}
  AI_SEARCH_CACHE_TTL_FULL: ${AI_SEARCH_CACHE_TTL_FULL:-180}

services:
  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "3002:3002"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - backend
    depends_on:
      - api-1
      - api-2
      - api-3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Node 1
  api-1:
    <<: *common-service
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: 3002
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq-cluster:5672
      ENV: production
      AI_SEARCH_LLM_PROVIDER: ${AI_SEARCH_LLM_PROVIDER:-openai}
      AI_SEARCH_LLM_MODEL: ${AI_SEARCH_LLM_MODEL}
      AI_SEARCH_LLM_API_KEY: ${AI_SEARCH_LLM_API_KEY}
      AI_SEARCH_LLM_BASE_URL: ${AI_SEARCH_LLM_BASE_URL}
      AI_SEARCH_RERANK_MODEL: ${AI_SEARCH_RERANK_MODEL}
      AI_SEARCH_RERANK_PROVIDER: ${AI_SEARCH_RERANK_PROVIDER}
      AI_SEARCH_RERANK_ENDPOINT: ${AI_SEARCH_RERANK_ENDPOINT}
      AI_SEARCH_RERANK_API_KEY: ${AI_SEARCH_RERANK_API_KEY}
      AI_SEARCH_RERANK_TIMEOUT: ${AI_SEARCH_RERANK_TIMEOUT}
    depends_on:
      redis-cluster:
        condition: service_healthy
      playwright-service-1:
        condition: service_healthy
      playwright-service-2:
        condition: service_healthy
      playwright-service-3:
        condition: service_healthy
      rabbitmq-cluster:
        condition: service_healthy
      postgres-cluster:
        condition: service_healthy
    command: node dist/src/harness.js --start-docker
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Node 2
  api-2:
    <<: *common-service
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: 3002
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq-cluster:5672
      ENV: production
      AI_SEARCH_LLM_PROVIDER: ${AI_SEARCH_LLM_PROVIDER:-openai}
      AI_SEARCH_LLM_MODEL: ${AI_SEARCH_LLM_MODEL}
      AI_SEARCH_LLM_API_KEY: ${AI_SEARCH_LLM_API_KEY}
      AI_SEARCH_LLM_BASE_URL: ${AI_SEARCH_LLM_BASE_URL}
      AI_SEARCH_RERANK_MODEL: ${AI_SEARCH_RERANK_MODEL}
      AI_SEARCH_RERANK_PROVIDER: ${AI_SEARCH_RERANK_PROVIDER}
      AI_SEARCH_RERANK_ENDPOINT: ${AI_SEARCH_RERANK_ENDPOINT}
      AI_SEARCH_RERANK_API_KEY: ${AI_SEARCH_RERANK_API_KEY}
      AI_SEARCH_RERANK_TIMEOUT: ${AI_SEARCH_RERANK_TIMEOUT}
    depends_on:
      redis-cluster:
        condition: service_healthy
      playwright-service-1:
        condition: service_healthy
      playwright-service-2:
        condition: service_healthy
      playwright-service-3:
        condition: service_healthy
      rabbitmq-cluster:
        condition: service_healthy
      postgres-cluster:
        condition: service_healthy
    command: node dist/src/harness.js --start-docker
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Node 3
  api-3:
    <<: *common-service
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: 3002
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq-cluster:5672
      ENV: production
      AI_SEARCH_LLM_PROVIDER: ${AI_SEARCH_LLM_PROVIDER:-openai}
      AI_SEARCH_LLM_MODEL: ${AI_SEARCH_LLM_MODEL}
      AI_SEARCH_LLM_API_KEY: ${AI_SEARCH_LLM_API_KEY}
      AI_SEARCH_LLM_BASE_URL: ${AI_SEARCH_LLM_BASE_URL}
      AI_SEARCH_RERANK_MODEL: ${AI_SEARCH_RERANK_MODEL}
      AI_SEARCH_RERANK_PROVIDER: ${AI_SEARCH_RERANK_PROVIDER}
      AI_SEARCH_RERANK_ENDPOINT: ${AI_SEARCH_RERANK_ENDPOINT}
      AI_SEARCH_RERANK_API_KEY: ${AI_SEARCH_RERANK_API_KEY}
      AI_SEARCH_RERANK_TIMEOUT: ${AI_SEARCH_RERANK_TIMEOUT}
    depends_on:
      redis-cluster:
        condition: service_healthy
      playwright-service-1:
        condition: service_healthy
      playwright-service-2:
        condition: service_healthy
      playwright-service-3:
        condition: service_healthy
      rabbitmq-cluster:
        condition: service_healthy
      postgres-cluster:
        condition: service_healthy
    command: node dist/src/harness.js --start-docker
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Playwright Service Instance 1
  playwright-service-1:
    build: apps/playwright-service-ts
    environment:
      PORT: 3000
      PROXY_SERVER: ${PROXY_SERVER}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      PROXY_STEALTH_SERVER: ${PROXY_STEALTH_SERVER}
      PROXY_STEALTH_USERNAME: ${PROXY_STEALTH_USERNAME}
      PROXY_STEALTH_PASSWORD: ${PROXY_STEALTH_PASSWORD}
      ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS}
      BLOCK_MEDIA: ${BLOCK_MEDIA:-true}
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-20}
    networks:
      - backend
    resources:
      limits:
        cpus: '2.0'
        memory: 4G
      reservations:
        cpus: '1.0'
        memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Playwright Service Instance 2
  playwright-service-2:
    build: apps/playwright-service-ts
    environment:
      PORT: 3000
      PROXY_SERVER: ${PROXY_SERVER}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      PROXY_STEALTH_SERVER: ${PROXY_STEALTH_SERVER}
      PROXY_STEALTH_USERNAME: ${PROXY_STEALTH_USERNAME}
      PROXY_STEALTH_PASSWORD: ${PROXY_STEALTH_PASSWORD}
      ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS}
      BLOCK_MEDIA: ${BLOCK_MEDIA:-true}
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-20}
    networks:
      - backend
    resources:
      limits:
        cpus: '2.0'
        memory: 4G
      reservations:
        cpus: '1.0'
        memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Playwright Service Instance 3
  playwright-service-3:
    build: apps/playwright-service-ts
    environment:
      PORT: 3000
      PROXY_SERVER: ${PROXY_SERVER}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      PROXY_STEALTH_SERVER: ${PROXY_STEALTH_SERVER}
      PROXY_STEALTH_USERNAME: ${PROXY_STEALTH_USERNAME}
      PROXY_STEALTH_PASSWORD: ${PROXY_STEALTH_PASSWORD}
      ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS}
      BLOCK_MEDIA: ${BLOCK_MEDIA:-true}
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-20}
    networks:
      - backend
    resources:
      limits:
        cpus: '2.0'
        memory: 4G
      reservations:
        cpus: '1.0'
        memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cluster
  redis-cluster:
    image: redis:7-alpine
    command: redis-server --bind 0.0.0.0 --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    networks:
      - backend
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RabbitMQ Cluster
  rabbitmq-cluster:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-firecrawl}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_DEFAULT_VHOST: /
    networks:
      - backend
    command: rabbitmq-server
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
    restart: unless-stopped

  # PostgreSQL Cluster
  postgres-cluster:
    build: apps/nuq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-firecrawl}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=13107kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firecrawl}"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nginx-logs:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  postgres-data:
    driver: local

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
